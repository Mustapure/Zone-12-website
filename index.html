<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
      <title>JCI Zone 12 | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --jci-blue: #0096D6;
            --sidebar-width: 260px;
            --bg-light: #f8f9fa;
        }

        body {
            margin: 0;
            display: flex;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #ddd;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar-brand {
            padding: 0 25px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--jci-blue);
        }

        .nav-item {
            padding: 15px 25px;
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        .nav-item:hover {
            background-color: #eef9ff;
            color: var(--jci-blue);
        }

        .nav-item.active {
            border-left: 5px solid var(--jci-blue);
            background-color: #eef9ff;
            color: var(--jci-blue);
        }

        /* Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: 100%;
        }

        /* Mobile View Adjustment */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-brand, .nav-item span { display: none; }
            .main-content { margin-left: 70px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">JCI India Zone12</div>
        
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i> <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-users"></i> <span>Networking App</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-store"></i> <span>Buy from JC</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-calendar-check"></i> <span>Events & Reg</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-book-open"></i> <span>E-Magazines</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-sitemap"></i> <span>LOM Chapters</span>
        </a>
        <hr style="width: 80%; border: 0.5px solid #eee;">
        <a href="#" class="nav-item">
            <i class="fas fa-sign-in-alt"></i> <span>Login / Join</span>
        </a>
    </div>

    <div class="main-content">
        <h2>Welcome to the Legacy Reimagined Portal</h2>
        <p>Select a section from the sidebar to manage your JCI activities.</p>
        
        <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h4>Today's Impact Highlights</h4>
            <p>New event published: <b>Zone 12 Midcon 2026</b></p>
        </div>
    </div>

</body>
</html>
